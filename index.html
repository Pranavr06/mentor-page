<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student & Mentor Login</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="container">

    <!-- Student Login Panel -->
    <div class="form-container student-container">
      <form action="#">
        <h1>Student Login</h1>
        <input type="text" placeholder="Student ID or Email" required>
        <input type="password" placeholder="Password" required>
        <a href="#">Forgot Password?</a>
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- Mentor Login Panel -->
    <div class="form-container mentor-container">
      <form action="#">
        <h1>Mentor Login</h1>
        <input type="text" placeholder="Mentor Username or Email" required>
        <input type="password" placeholder="Password" required>
        <a href="#">Forgot Password?</a>
        <button type="submit">Login</button>
      </form>
    </div>

  </div>
</body>
</html>
