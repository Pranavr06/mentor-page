<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor Profile</title>
  <link rel="stylesheet" href="mentor-profile.css" />
</head>
<body>
  <section class="profile-section">
    <h1>Mentor Info</h1>
    <div class="profile-container">
      <div class="profile-pic">
        <img src="mentor-image.jpg" alt="Mentor Profile Picture" class="profile-image" id="mentor-image">
      </div>

      <table id="mentor-info">
        <tr><th>Name</th><td id="mentor-name">Loading...</td></tr>
        <tr><th>Email</th><td id="mentor-email">Loading...</td></tr>
        <tr><th>Phone</th><td id="mentor-phone">Loading...</td></tr>
        <tr><th>Place of Work</th><td id="mentor-place">Loading...</td></tr>
        <tr><th>Hobbies</th><td id="mentor-hobbies">Loading...</td></tr>
      </table>
    </div>
  </section>

  <script src="mentor-profile.js"></script>
</body>
</html>
