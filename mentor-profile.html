<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mentor Profile & Student Carousel</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="mentor-profile.css" />
  <link rel="stylesheet" href="mentor-profile.css" />
</head>
<body class="bg-light">

  <!-- Mentor Profile Section -->
  <section class="profile-section container py-5">
    <h1 class="text-center mb-4">Mentor Info</h1>
    <div class="profile-container d-flex flex-column align-items-center">
      <div class="profile-pic mb-4">
        <img src="./file/mentor.png" alt="Mentor Profile Picture" class="profile-image" id="mentor-image">
      </div>

      <table id="mentor-info" class="table table-bordered w-100 w-md-75">
        <tr><th>Name</th><td id="mentor-name">Loading...</td></tr>
        <tr><th>Email</th><td id="mentor-email">Loading...</td></tr>
        <tr><th>Phone</th><td id="mentor-phone">Loading...</td></tr>
        <tr><th>Place of Work</th><td id="mentor-place">Loading...</td></tr>
        <tr><th>Hobbies</th><td id="mentor-hobbies">Loading...</td></tr>
      </table>
    </div>
  </section>

  <!-- Student Carousel Section -->
  <div class="container mt-5">
    <h2 class="text-center mb-4">Select Student Year</h2>

    <!-- Year Buttons -->
    <div class="year-buttons text-center mb-3">
      <button class="btn btn-primary m-1" onclick="loadCarousel(2024)">2024</button>
      <button class="btn btn-primary m-1" onclick="loadCarousel(2025)">2025</button>
      <button class="btn btn-primary m-1" onclick="loadCarousel(2026)">2026</button>
      <button class="btn btn-primary m-1" onclick="loadCarousel(2027)">2027</button>
      <button class="btn btn-primary m-1" onclick="loadCarousel(2028)">2028</button>
    </div>

    <!-- Carousel -->
    <div id="studentCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner" id="carouselInner">
        <!-- Carousel items will load here -->
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#studentCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#studentCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Mentor JS -->
  <script src="mentor-profile.js"></script>

  <!-- Carousel JS -->
  <script src="mentor-profile.js"></script>

</body>
</html>
